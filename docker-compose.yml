version: '3.8'

services:

  # Servicio de logs
  logs:
    build:
      context: ./logs
      dockerfile: dockerfile
    container_name: logs
    restart: unless-stopped
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      - MONGO_URI=${MONGO_URI}
    networks:
      - app-network

  # Servicio principal (app)
  app:
    build:
      context: ./app
      dockerfile: dockerfile
    container_name: app
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      logs:
        condition: service_started
    networks:
      - app-network

  # Servicio de lectura
  readuser:
    build:
      context: ./readuser
      dockerfile: dockerfile
    container_name: readuser
    restart: unless-stopped
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - API_KEY=${API_KEY}
    depends_on:
      logs:
        condition: service_started
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
